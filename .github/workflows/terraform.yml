name: Terraform Apply

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/415090109691/locations/global/workloadIdentityPools/github-pool/providers/github
          service_account: github-wif@project-d318db8d-3948-41a2-88d.iam.gserviceaccount.com

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init
      - name: Import service account (one-time)
        run: terraform import google_service_account.github_wif projects/project-d318db8d-3948-41a2-88d/serviceAccounts/github-wif@project-d318db8d-3948-41a2-88d.iam.gserviceaccount.com || true
      - run: terraform plan -out=tfplan
      - run: terraform apply -auto-approve tfplan
